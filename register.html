<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Klassen-Kasse - Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --chassis:       #2a2118;
      --chassis-light: #3d3020;
      --chassis-dark:  #1a1510;
      --metal:         #c8b090;
      --metal-dark:    #a09070;
      --lcd-bg:        #0d1a0d;
      --lcd-text:      #39ff14;
      --lcd-dim:       #1a3a1a;
      --key-red:       #c0392b;
      --key-red-top:   #e74c3c;
      --key-green:     #1a7a3a;
      --key-green-top: #27ae60;
      --key-blue:      #1a4a8a;
      --key-blue-top:  #2980b9;
      --key-amber:     #a85a00;
      --key-amber-top: #e67e22;
      --key-grey:      #3a3a3a;
      --key-grey-top:  #555;
      --key-shadow:    rgba(0,0,0,0.6);
      --bezel:         #4a3d28;
      --stripe:        #c8a860;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #111;
      overscroll-behavior: none;
    }

    body {
      font-family: 'Oswald', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% 0%, #2a2000 0%, #0a0a0a 70%);
    }

    /* ─── Main chassis ─── */
    .register {
      width: 100%;
      max-width: 860px;
      background: linear-gradient(160deg, var(--chassis-light) 0%, var(--chassis) 40%, var(--chassis-dark) 100%);
      border-radius: 22px 22px 28px 28px;
      box-shadow:
        0 0 0 3px var(--bezel),
        0 0 0 5px #1a1200,
        0 8px 40px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.07),
        inset 0 -2px 6px rgba(0,0,0,0.5);
      padding: 18px 18px 24px;
      position: relative;
    }

    /* decorative stripe */
    .register::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px; height: 4px;
      background: linear-gradient(90deg, transparent, var(--stripe), var(--stripe), transparent);
      border-radius: 0 0 4px 4px;
      opacity: 0.6;
    }

    /* ─── Header bar ─── */
    .register-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .brand {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      color: var(--stripe);
      text-shadow: 0 0 12px rgba(200,168,96,0.5);
      text-transform: uppercase;
    }
    .brand span {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--metal-dark);
      display: block;
      letter-spacing: 0.25em;
    }
    .status-lights {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .light {
      width: 10px; height: 10px;
      border-radius: 50%;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
    }
    .light-red   { background: #c0392b; box-shadow: 0 0 6px #ff4444; }
    .light-amber { background: #e67e22; box-shadow: 0 0 6px #ffaa00; }
    .light-green { background: #27ae60; box-shadow: 0 0 8px #39ff14; }

    /* ─── LCD Display section ─── */
    .lcd-panel {
      background: #1a1208;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.8),
        inset 0 0 0 2px #0a0800,
        0 1px 0 rgba(255,255,255,0.05);
      border: 2px solid #100e08;
    }

    .lcd-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }

    .lcd-screen {
      flex: 1;
      background: var(--lcd-bg);
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,0.9),
        inset 0 0 0 1px #0a1a0a,
        0 0 12px rgba(57,255,20,0.05);
      position: relative;
      overflow: hidden;
    }
    /* scanline overlay */
    .lcd-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      border-radius: 8px;
    }

    .lcd-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: var(--lcd-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .lcd-value {
      font-family: 'VT323', monospace;
      font-size: 2.8rem;
      line-height: 1;
      color: var(--lcd-text);
      text-shadow: 0 0 10px rgba(57,255,20,0.7), 0 0 20px rgba(57,255,20,0.3);
      letter-spacing: 0.05em;
    }
    .lcd-value.small { font-size: 1.8rem; }

    .lcd-mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      min-width: 180px;
    }
    .lcd-mini {
      background: var(--lcd-bg);
      border-radius: 7px;
      padding: 8px 10px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.9), inset 0 0 0 1px #0a1a0a;
      position: relative;
      overflow: hidden;
    }
    .lcd-mini::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none;
    }
    .lcd-mini .lcd-value { font-size: 1.6rem; }

    .msg-bar {
      margin-top: 8px;
      background: var(--lcd-bg);
      border-radius: 6px;
      padding: 6px 12px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.9);
      min-height: 32px;
      display: flex;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    .msg-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      pointer-events: none;
    }
    #msg {
      font-family: 'VT323', monospace;
      font-size: 1.3rem;
      color: var(--lcd-text);
      text-shadow: 0 0 8px rgba(57,255,20,0.5);
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 1;
    }
    #msg.error { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,0.5); }

    /* ─── Key section label ─── */
    .section-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--metal-dark);
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-left: 4px;
    }

    /* ─── Key panel ─── */
    .key-panel {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* Portrait: single column sections */
    .key-panel-row {
      display: flex;
      gap: 12px;
    }

    .key-group {
      background: linear-gradient(170deg, #222018, #181410);
      border-radius: 14px;
      padding: 12px;
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 2px 0 rgba(255,255,255,0.03);
    }
    .key-group.grow { flex: 1; }

    /* ─── Buttons ─── */
    .key-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .key-row:last-child { margin-bottom: 0; }

    .btn {
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: filter 0.1s;
    }

    /* 3D key effect */
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.18) 0%, transparent 55%);
      pointer-events: none;
    }
    .btn:active {
      transform: translateY(3px);
      filter: brightness(0.85);
    }
    .btn:active::before { opacity: 0.5; }

    /* Key sizes */
    .btn-sq {
      width: 80px; height: 80px;
      font-size: 1.1rem;
    }
    .btn-sq .btn-sub {
      font-size: 0.58rem;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.08em;
      opacity: 0.85;
      margin-top: 2px;
      font-weight: 400;
    }
    .btn-sq .btn-icon {
      font-size: 1.6rem;
      line-height: 1;
    }
    .btn-wide {
      flex: 1;
      height: 64px;
      font-size: 1rem;
    }
    .btn-xl {
      flex: 1;
      height: 76px;
      font-size: 1.3rem;
      border-radius: 12px;
    }
    .btn-sm {
      height: 52px;
      padding: 0 16px;
      font-size: 0.95rem;
      flex: 1;
    }

    /* display readout button (non-clickable) */
    .key-display {
      background: var(--lcd-bg);
      border-radius: 8px;
      padding: 8px 14px;
      min-width: 80px;
      text-align: center;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,0.9),
        inset 0 0 0 1px #0a1a0a;
      position: relative;
      overflow: hidden;
    }
    .key-display::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none;
    }
    .key-display .lcd-value { font-size: 1.8rem; }

    /* Color variants */
    .btn-red {
      background: linear-gradient(180deg, var(--key-red-top), var(--key-red));
      color: #fff;
      box-shadow: 0 5px 0 #8b1a1a, 0 6px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,100,100,0.2);
    }
    .btn-red:active { box-shadow: 0 2px 0 #8b1a1a, 0 3px 4px rgba(0,0,0,0.5); }

    .btn-green {
      background: linear-gradient(180deg, var(--key-green-top), var(--key-green));
      color: #fff;
      box-shadow: 0 5px 0 #0f4a22, 0 6px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(80,255,120,0.15);
    }
    .btn-green:active { box-shadow: 0 2px 0 #0f4a22, 0 3px 4px rgba(0,0,0,0.5); }

    .btn-blue {
      background: linear-gradient(180deg, var(--key-blue-top), var(--key-blue));
      color: #fff;
      box-shadow: 0 5px 0 #0f2a5a, 0 6px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(80,160,255,0.2);
    }
    .btn-blue:active { box-shadow: 0 2px 0 #0f2a5a, 0 3px 4px rgba(0,0,0,0.5); }

    .btn-amber {
      background: linear-gradient(180deg, var(--key-amber-top), var(--key-amber));
      color: #fff;
      box-shadow: 0 5px 0 #6a3500, 0 6px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,200,80,0.2);
    }
    .btn-amber:active { box-shadow: 0 2px 0 #6a3500, 0 3px 4px rgba(0,0,0,0.5); }

    .btn-grey {
      background: linear-gradient(180deg, var(--key-grey-top), var(--key-grey));
      color: #ccc;
      box-shadow: 0 5px 0 #1a1a1a, 0 6px 8px rgba(0,0,0,0.5);
    }
    .btn-grey:active { box-shadow: 0 2px 0 #1a1a1a, 0 3px 4px rgba(0,0,0,0.5); }

    /* ─── Transaction tape ─── */
    .tape-section {
      background: linear-gradient(170deg, #222018, #181410);
      border-radius: 14px;
      padding: 12px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
      margin-bottom: 12px;
    }

    .tape-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .tape-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: var(--metal-dark);
      text-transform: uppercase;
    }
    .tx-badge {
      background: #1a1208;
      border-radius: 20px;
      padding: 2px 10px;
      font-family: 'VT323', monospace;
      font-size: 1rem;
      color: var(--stripe);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
    }

    .tape-body {
      background: #f5f0e8;
      border-radius: 8px;
      max-height: 200px;
      overflow-y: auto;
      padding: 10px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 0 0 1px #c8b090;
      position: relative;
    }
    /* thermal paper lines */
    .tape-body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        180deg,
        transparent 0px,
        transparent 22px,
        rgba(0,0,0,0.03) 22px,
        rgba(0,0,0,0.03) 23px
      );
      pointer-events: none;
      border-radius: 8px;
    }

    .tape-empty {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: #999;
      text-align: center;
      padding: 12px;
    }

    .tape-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: #2a2010;
    }
    .tape-table th {
      color: #666;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      border-bottom: 1px dashed #bbb;
      padding: 2px 4px 4px;
      text-align: left;
    }
    .tape-table td {
      padding: 4px 4px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .tape-table tr:last-child td { border-bottom: none; }
    .tape-table td:last-child { text-align: right; font-weight: bold; }

    /* ─── Summary section ─── */
    .summary-section {
      background: linear-gradient(170deg, #222018, #181410);
      border-radius: 14px;
      padding: 12px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
    }

    .summary-toggle {
      width: 100%;
      background: linear-gradient(180deg, #3a3020, #2a2010);
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      color: var(--stripe);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 3px 0 #1a1008, 0 4px 6px rgba(0,0,0,0.4);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: filter 0.1s;
    }
    .summary-toggle:active { transform: translateY(2px); filter: brightness(0.85); }

    .summary-body {
      display: none;
      margin-top: 10px;
    }
    .summary-body.open { display: block; }

    .summary-tape {
      background: #f5f0e8;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: #2a2010;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 0 0 1px #c8b090;
      position: relative;
      overflow: hidden;
    }
    .summary-tape::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(180deg, transparent 0px, transparent 22px, rgba(0,0,0,0.03) 22px, rgba(0,0,0,0.03) 23px);
      pointer-events: none;
    }
    .summary-tape h3 {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: #555;
      border-bottom: 1px dashed #bbb;
      padding-bottom: 4px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .summary-tape table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }
    .summary-tape th {
      font-size: 0.58rem;
      color: #888;
      text-align: left;
      padding: 2px 0 4px;
      border-bottom: 1px dashed #ccc;
    }
    .summary-tape td {
      padding: 3px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .summary-tape td:last-child { text-align: right; font-weight: bold; }
    .summary-stat {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .summary-stat:last-child { border-bottom: none; font-weight: bold; border-top: 1px dashed #bbb; margin-top: 2px; padding-top: 6px; }

    /* ─── LANDSCAPE LAYOUT ─── */
    @media (orientation: landscape) {
      body { padding: 10px 20px; align-items: center; }

      .register { padding: 14px 16px 18px; }

      .lcd-mini-grid { grid-template-columns: 1fr 1fr; min-width: 160px; }

      .landscape-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .tape-body { max-height: 140px; }
      .btn-sq { width: 68px; height: 68px; }
      .btn-xl { height: 62px; }
      .btn-wide { height: 54px; }
      .btn-sm { height: 44px; }
    }

    /* ─── TOUCH / COARSE POINTER ─── */
    @media (pointer: coarse) {
      .btn-sq { width: 90px; height: 90px; }
      .btn-sq .btn-icon { font-size: 1.8rem; }
      .btn-xl { height: 82px; font-size: 1.35rem; }
    }

    @media (pointer: coarse) and (orientation: landscape) {
      .btn-sq { width: 74px; height: 74px; }
      .btn-xl { height: 68px; }
    }

    /* ─── Smaller phones ─── */
    @media (max-width: 400px) {
      .btn-sq { width: 70px; height: 70px; font-size: 0.95rem; }
      .lcd-mini-grid { grid-template-columns: 1fr 1fr; min-width: 120px; }
    }

    /* scrollbar on tape */
    .tape-body::-webkit-scrollbar { width: 4px; }
    .tape-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    .tape-body::-webkit-scrollbar-thumb { background: #c8b090; border-radius: 4px; }
  </style>
</head>
<body>

<div class="register">

  <!-- Header -->
  <div class="register-header">
    <div class="brand">
      Klassen-Kasse
      <span>Model 5F · Mr. Oehm</span>
    </div>
    <div class="status-lights">
      <div class="light light-green" id="lightSell"></div>
      <div class="light light-amber" id="lightWarn"></div>
      <div class="light light-red" id="lightErr"></div>
    </div>
  </div>

  <!-- LCD Display -->
  <div class="lcd-panel">
    <div class="lcd-row">
      <div class="lcd-screen" style="position:relative; min-height:80px">
        <div class="lcd-label">Total</div>
        <div class="lcd-value" id="totalDisplay" style="font-size:2.6rem; line-height:1.05">0,00€</div>
        <div style="position:absolute; bottom:8px; right:10px; text-align:right; z-index:1">
          <div class="lcd-label" style="font-size:0.5rem">AVAILABLE</div>
          <div class="lcd-value" id="currentStock" style="font-size:2.6rem; text-shadow:0 0 6px rgba(57,255,20,0.5)">20</div>
        </div>
      </div>
      <div class="lcd-mini-grid">
        <div class="lcd-mini">
          <div class="lcd-label">Last Tx</div>
          <div class="lcd-value" id="lastTxDisplay">—</div>
        </div>
        <div class="lcd-mini">
          <div class="lcd-label">Unit Price</div>
          <div class="lcd-value" id="priceDisplay">1,00€</div>
        </div>
        <div class="lcd-mini">
          <div class="lcd-label">Quantity</div>
          <div class="lcd-value" id="qtyDisplay">1</div>
        </div>
        <div class="lcd-mini">
          <div class="lcd-label">Transact.</div>
          <div class="lcd-value" id="transactDisplay">0,00€</div>
        </div>
      </div>
    </div>
    <div class="msg-bar">
      <div id="msg">READY&nbsp;▶</div>
    </div>
  </div>

  <!-- Key panels -->
  <div class="landscape-grid">

    <!-- Left: Bestand + Preis + Menge -->
    <div>
      <!-- Starting Supply (compact) -->
      <div class="key-group" style="margin-bottom:10px; padding:8px 12px">
        <div style="display:flex; align-items:center; gap:8px">
          <div style="display:flex; flex-direction:column; gap:2px; margin-right:2px">
            <span class="section-label" style="margin:0; white-space:nowrap; line-height:1.2">▸ START</span>
            <span class="section-label" style="margin:0; white-space:nowrap; line-height:1.2">SUPPLY</span>
          </div>
          <button id="stockDec" class="btn btn-blue" style="width:40px;height:40px;font-size:1.1rem" aria-label="Supply -1">−</button>
          <button class="btn btn-blue" style="width:40px;height:40px;font-size:0.8rem" data-stock-add="-5">−5</button>
          <div class="key-display" style="min-width:56px; padding:4px 8px; display:flex; flex-direction:column; align-items:center">
            <div class="lcd-label" style="font-size:0.5rem">SUPPLY</div>
            <div class="lcd-value" id="startStockDisplay" style="font-size:1.4rem; line-height:1.1">20</div>
          </div>
          <button class="btn btn-blue" style="width:40px;height:40px;font-size:0.8rem" data-stock-add="5">+5</button>
          <button id="stockInc" class="btn btn-blue" style="width:40px;height:40px;font-size:1.1rem" aria-label="Supply +1">＋</button>
          <button id="setStock" class="btn btn-amber" style="height:40px;padding:0 12px;font-size:0.8rem;letter-spacing:0.05em" aria-label="Set supply">SET</button>
        </div>
      </div>

      <!-- Price -->
      <div class="section-label">▸ Price per Unit</div>
      <div class="key-group" style="margin-bottom:10px">
        <div class="key-row">
          <button id="priceDec" class="btn btn-amber btn-sq" aria-label="Price -0.50€">
            <span class="btn-icon">−</span>
            <span class="btn-sub">0.50 €</span>
          </button>
          <div class="key-display" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center">
            <div class="lcd-label">Price</div>
            <div class="lcd-value" id="priceDisplayKey" style="font-size:2rem">1,00€</div>
          </div>
          <button id="priceInc" class="btn btn-amber btn-sq" aria-label="Price +0.50€">
            <span class="btn-icon">＋</span>
            <span class="btn-sub">0.50 €</span>
          </button>
        </div>
      </div>

      <!-- Quantity -->
      <div class="section-label">▸ Quantity</div>
      <div class="key-group">
        <div class="key-row">
          <button id="qtyDec" class="btn btn-green btn-sq" aria-label="Quantity -1">
            <span class="btn-icon">−</span>
            <span class="btn-sub">QTY</span>
          </button>
          <div class="key-display" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center">
            <div class="lcd-label">Quantity</div>
            <div class="lcd-value" id="qtyDisplayKey" style="font-size:2rem">1</div>
          </div>
          <button id="qtyInc" class="btn btn-green btn-sq" aria-label="Quantity +1">
            <span class="btn-icon">＋</span>
            <span class="btn-sub">QTY</span>
          </button>
        </div>
        <div class="key-row">
          <button class="btn btn-green btn-sm" data-add="-5">−5</button>
          <button class="btn btn-green btn-sm" data-add="5">+5</button>
          <button class="btn btn-green btn-sm" data-add="10">+10</button>
          <button id="allBtn" class="btn btn-green btn-sm">ALL</button>
        </div>
      </div>
    </div>

    <!-- Right: Actions + Tape + Summary -->
    <div>
      <!-- Actions -->
      <div class="section-label">▸ Action</div>
      <div class="key-group" style="margin-bottom:10px">
        <div class="key-row">
          <button id="sell" class="btn btn-red btn-xl" aria-label="Sell">
            🛒 SELL
          </button>
          <button id="undoBtn" class="btn btn-grey btn-wide" aria-label="Undo last sale" style="max-width:100px">
            ↩ UNDO
          </button>
          <button id="clear" class="btn btn-grey btn-wide" aria-label="Reset" style="max-width:90px">
            ↺ RESET
          </button>
        </div>
      </div>

      <!-- Transaction tape -->
      <div class="tape-section">
        <div class="tape-header">
          <span class="tape-title">▸ Transactions</span>
          <span class="tx-badge" id="txBadge">0</span>
        </div>
        <div class="tape-body" id="txList">
          <div class="tape-empty">— No sales yet —</div>
        </div>
      </div>

      <!-- Summary -->
      <div class="summary-section">
        <button class="summary-toggle" id="showSummary">
          <span>▸ SUMMARY</span>
          <span id="summaryArrow">▼</span>
        </button>
        <div class="summary-body" id="summary">
          <div class="summary-tape">
            <div id="aggByPrice"></div>
            <div id="averages" style="margin-top:8px"></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /landscape-grid -->
</div><!-- /register -->

<script>
  const STORAGE_KEY = 'registrierkasse_v2';
  const defaultState = {
    stock: 20, startStock: 20,
    priceCents: 100, qty: 1, transactions: []
  };
  let state = loadState();

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ const p=JSON.parse(raw); if(p&&typeof p==='object') return Object.assign({},defaultState,p); }
    }catch(e){}
    return Object.assign({},defaultState);
  }
  function saveState(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){} }

  const $ = id => document.getElementById(id);
  const els = {
    currentStock:    $('currentStock'),
    startStockDisp:  $('startStockDisplay'),
    priceDisp:       $('priceDisplay'),
    priceDispKey:    $('priceDisplayKey'),
    qtyDisp:         $('qtyDisplay'),
    qtyDispKey:      $('qtyDisplayKey'),
    txBadge:         $('txBadge'),
    transactDisplay: $('transactDisplay'),
    totalDisplay:    $('totalDisplay'),
    lastTxDisplay:   $('lastTxDisplay'),
    txList:          $('txList'),
    msg:             $('msg'),
    summary:         $('summary'),
    aggByPrice:      $('aggByPrice'),
    averages:        $('averages'),
    summaryArrow:    $('summaryArrow'),
    lightSell:       $('lightSell'),
    lightWarn:       $('lightWarn'),
    lightErr:        $('lightErr'),
  };

  function fmt(n){ return Number(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
  function centsDisp(c){ return (c/100).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+'€'; }

  function setMsg(text, type='ok'){
    els.msg.textContent = text;
    els.msg.className = type==='error' ? 'error' : '';
    // lights
    els.lightSell.style.boxShadow = type==='ok' ? '0 0 10px #39ff14' : '0 0 4px #1a4a1a';
    els.lightWarn.style.boxShadow = type==='warn' ? '0 0 10px #ffaa00' : '0 0 4px #4a3a0a';
    els.lightErr.style.boxShadow  = type==='error' ? '0 0 10px #ff4444' : '0 0 4px #4a1a1a';
  }

  function renderAll(){
    els.currentStock.textContent = state.stock;
    els.startStockDisp.textContent = state.startStock;
    els.priceDisp.textContent = centsDisp(state.priceCents);
    els.priceDispKey.textContent = centsDisp(state.priceCents);
    els.qtyDisp.textContent = state.qty;
    els.qtyDispKey.textContent = state.qty;

    const total = state.transactions.reduce((s,t)=>s+t.total,0);
    els.totalDisplay.textContent = fmt(total);

    // Last transaction big display
    if(state.transactions.length > 0){
      const last = state.transactions[state.transactions.length-1];
      els.lastTxDisplay.textContent = fmt(last.total);
    } else {
      els.lastTxDisplay.textContent = '—';
    }

    const n = state.transactions.length;
    els.txBadge.textContent = n;

    const transactAmt = (state.priceCents / 100) * state.qty;
    els.transactDisplay.textContent = centsDisp(Math.round(transactAmt * 100));

    renderTransactions();
    saveState();
  }

  function renderTransactions(){
    if(state.transactions.length===0){
      els.txList.innerHTML = '<div class="tape-empty">— No sales yet —</div>';
      return;
    }
    const rows = state.transactions.slice().reverse().map(tx =>
      `<tr>
        <td>${new Date(tx.time).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</td>
        <td>${tx.qty}×</td>
        <td>${fmt(tx.price)}</td>
        <td>${fmt(tx.total)}</td>
      </tr>`
    ).join('');
    els.txList.innerHTML =
      `<table class="tape-table">
        <thead><tr><th>Time</th><th>Qty.</th><th>Price</th><th>Total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    // scroll to top (newest first)
    els.txList.scrollTop = 0;
  }

  function renderSummary(){
    const agg = new Map();
    for(const tx of state.transactions){
      const k = (Math.round(tx.price*100)/100).toFixed(2);
      const e = agg.get(k)||{price:Number(k),qty:0,total:0};
      e.qty+=tx.qty; e.total+=tx.total;
      agg.set(k,e);
    }
    const sorted = Array.from(agg.values()).sort((a,b)=>a.price-b.price);

    if(sorted.length===0){
      els.aggByPrice.innerHTML='<div style="color:#888;font-size:0.7rem">No sales yet.</div>';
      els.averages.innerHTML='';
      return;
    }
    const rows = sorted.map(a=>`<tr><td>${a.qty}</td><td>${fmt(a.price)}</td><td>${fmt(a.total)}</td></tr>`).join('');
    els.aggByPrice.innerHTML=
      `<h3>Sales by Price</h3>
       <table><thead><tr><th>Qty.</th><th>Price/Unit</th><th>Revenue</th></tr></thead><tbody>${rows}</tbody></table>`;

    const totalItems = state.transactions.reduce((s,t)=>s+t.qty,0);
    const totalRev   = state.transactions.reduce((s,t)=>s+t.total,0);
    els.averages.innerHTML=
      `<h3>Averages</h3>
       <div class="summary-stat"><span>Total items sold</span><strong>${totalItems}</strong></div>
       <div class="summary-stat"><span>Total revenue</span><strong>${fmt(totalRev)}</strong></div>
       <div class="summary-stat"><span>Avg. per item</span><strong>${fmt(totalItems?totalRev/totalItems:0)}</strong></div>
       <div class="summary-stat"><span>Avg. per transaction</span><strong>${fmt(state.transactions.length?totalRev/state.transactions.length:0)}</strong></div>`;
  }

  // Orientation class
  function updateOrientation(){
    document.body.classList.toggle('landscape', window.matchMedia('(orientation:landscape)').matches);
  }
  window.addEventListener('resize', updateOrientation);
  window.addEventListener('orientationchange', updateOrientation);
  updateOrientation();

  // Supply
  $('stockInc').addEventListener('click',()=>{ state.startStock=Math.max(0,state.startStock+1); renderAll(); });
  $('stockDec').addEventListener('click',()=>{ state.startStock=Math.max(0,state.startStock-1); renderAll(); });
  $('setStock').addEventListener('click',()=>{ state.stock=state.startStock; renderAll(); setMsg('SUPPLY APPLIED'); });
  document.querySelectorAll('[data-stock-add]').forEach(b=>{
    b.addEventListener('click',()=>{ state.startStock=Math.max(0,state.startStock+Number(b.dataset.stockAdd)); renderAll(); });
  });

  // Undo
  $('undoBtn').addEventListener('click',()=>{
    if(state.transactions.length===0){ setMsg('NOTHING TO UNDO','error'); return; }
    const last = state.transactions.pop();
    state.stock += last.qty;
    renderAll();
    if($('summary').classList.contains('open')) renderSummary();
    setMsg(`UNDONE: ${last.qty} × ${fmt(last.price)}`,'ok');
  });

  // Preis
  $('priceInc').addEventListener('click',()=>{ state.priceCents=Math.max(0,state.priceCents+50); renderAll(); });
  $('priceDec').addEventListener('click',()=>{ state.priceCents=Math.max(0,state.priceCents-50); renderAll(); });

  // Menge
  $('qtyInc').addEventListener('click',()=>{ state.qty=Math.max(1,state.qty+1); renderAll(); });
  $('qtyDec').addEventListener('click',()=>{ state.qty=Math.max(1,state.qty-1); renderAll(); });
  document.querySelectorAll('[data-add]').forEach(b=>{
    b.addEventListener('click',()=>{ state.qty=Math.max(1,state.qty+Number(b.dataset.add)); renderAll(); });
  });
  $('allBtn').addEventListener('click',()=>{ state.qty=Math.max(1,state.stock); renderAll(); });

  // Verkaufen
  $('sell').addEventListener('click',()=>{
    const price = state.priceCents/100;
    const qty   = Math.floor(state.qty);
    if(qty<=0){ setMsg('QTY MUST BE > 0','error'); return; }
    if(qty>state.stock){ setMsg('INSUFFICIENT SUPPLY','error'); return; }
    const total = Math.round((price*qty+Number.EPSILON)*100)/100;
    state.stock -= qty;
    state.transactions.push({ price: Math.round((price+Number.EPSILON)*100)/100, qty, total, time: new Date().toISOString() });
    renderAll();
    if($('summary').classList.contains('open')) renderSummary();
    setMsg(`OK  ${qty} × ${centsDisp(state.priceCents)} = ${fmt(total)}`,'ok');
    // flash green light
    els.lightSell.style.boxShadow='0 0 18px #39ff14, 0 0 30px #39ff14';
    setTimeout(()=>{ els.lightSell.style.boxShadow='0 0 8px #39ff14'; },300);
    // warn if stock low
    if(state.stock < 5) setMsg(`LOW SUPPLY WARNING: ${state.stock} LEFT`,'warn');
  });

  // Reset (two-tap: first press arms, second fires)
  let resetArmed = false, resetTimer = null;
  $('clear').addEventListener('click',()=>{
    if(!resetArmed){
      resetArmed = true;
      $('clear').textContent = '⚠ SURE?';
      $('clear').style.background = 'linear-gradient(180deg,#e74c3c,#c0392b)';
      $('clear').style.color = '#fff';
      resetTimer = setTimeout(()=>{
        resetArmed = false;
        $('clear').textContent = '↺ RESET';
        $('clear').style.background = '';
        $('clear').style.color = '';
      }, 3000);
    } else {
      clearTimeout(resetTimer);
      resetArmed = false;
      $('clear').textContent = '↺ RESET';
      $('clear').style.background = '';
      $('clear').style.color = '';
      state.transactions=[];
      state.startStock=10;
      state.stock=10;
      state.priceCents=100;
      state.qty=1;
      saveState();
      renderAll();
      if($('summary').classList.contains('open')) renderSummary();
      setMsg('SYSTEM RESET');
    }
  });

  // Summary toggle
  $('showSummary').addEventListener('click',()=>{
    const open = els.summary.classList.toggle('open');
    els.summaryArrow.textContent = open ? '▲' : '▼';
    if(open) renderSummary();
  });

  // Init
  setMsg('READY\u00A0▶');
  renderAll();
</script>
</body>
</html>
