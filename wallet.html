<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Klassen-Wallet · 5F</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --chassis:       #1a3a6a;
      --chassis-light: #2a5090;
      --chassis-dark:  #102040;
      --stitch:        #90d0ff;
      --metal:         #a0c8e8;
      --metal-dark:    #6090b8;
      --lcd-bg:        #060e1a;
      --lcd-text:      #ffd700;
      --lcd-dim:       #4a6080;
      --key-teal:      #0e6060;
      --key-teal-top:  #1a9090;
      --key-red:       #8b1a1a;
      --key-red-top:   #c0392b;
      --key-amber:     #a85a00;
      --key-amber-top: #e67e22;
      --key-grey:      #3a3a3a;
      --key-grey-top:  #555;
      --bezel:         #4080c0;
      --stripe:        #90d0ff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overscroll-behavior: none; }

    body {
      font-family: 'Oswald', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 16px;
      min-height: 100vh;
      background: radial-gradient(ellipse at 50% 0%, #5090d0 0%, #2060a8 60%, #0e3060 100%);
    }

    /* ─── Main chassis ─── */
    .wallet {
      width: 100%;
      max-width: 860px;
      background: linear-gradient(160deg, var(--chassis-light) 0%, var(--chassis) 40%, var(--chassis-dark) 100%);
      border-radius: 22px 22px 28px 28px;
      box-shadow:
        0 0 0 3px var(--bezel),
        0 0 0 5px #020508,
        0 8px 40px rgba(0,0,0,0.9),
        inset 0 1px 0 rgba(255,255,255,0.06),
        inset 0 -2px 6px rgba(0,0,0,0.5);
      padding: 18px 18px 24px;
      position: relative;
    }

    /* leather texture strip */
    .wallet::before {
      content: '';
      position: absolute;
      top: 0; left: 24px; right: 24px; height: 4px;
      background: linear-gradient(90deg, transparent, var(--stitch), var(--stitch), transparent);
      border-radius: 0 0 4px 4px;
      opacity: 0.5;
    }

    /* ─── Header ─── */
    .wallet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      padding: 0 4px;
    }
    .brand {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      letter-spacing: 0.12em;
      color: var(--stitch);
      text-shadow: 0 0 12px rgba(200,160,96,0.5);
      text-transform: uppercase;
    }
    .brand span {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--metal-dark);
      display: block;
      letter-spacing: 0.25em;
    }
    .status-lights {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .light {
      width: 10px; height: 10px;
      border-radius: 50%;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
    }
    .light-red   { background: #c0392b; }
    .light-amber { background: #e67e22; }
    .light-green { background: #27ae60; box-shadow: 0 0 8px #ffd700; }

    /* ─── LCD panel ─── */
    .lcd-panel {
      background: #080f1a;
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 14px;
      box-shadow:
        inset 0 3px 10px rgba(0,0,0,0.8),
        inset 0 0 0 2px #040810,
        0 1px 0 rgba(255,255,255,0.04);
      border: 2px solid #060c18;
    }

    .lcd-row { display: flex; gap: 10px; align-items: stretch; }

    .lcd-screen {
      flex: 1;
      background: var(--lcd-bg);
      border-radius: 8px;
      padding: 10px 14px;
      box-shadow:
        inset 0 2px 8px rgba(0,0,0,0.9),
        inset 0 0 0 1px #051005,
        0 0 12px rgba(255,215,0,0.04);
      position: relative;
      overflow: hidden;
      min-height: 80px;
    }
    .lcd-screen::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      pointer-events: none;
      border-radius: 8px;
    }

    .lcd-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      color: #7ab8e0;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 3px;
    }
    .lcd-value {
      font-family: 'VT323', monospace;
      font-size: 2.8rem;
      line-height: 1;
      color: var(--lcd-text);
      text-shadow: 0 0 10px rgba(255,215,0,0.7), 0 0 20px rgba(255,215,0,0.25);
      letter-spacing: 0.04em;
      z-index: 1;
      position: relative;
    }

    /* balance sub-label in corner */
    .lcd-total-corner {
      position: absolute;
      bottom: 8px; right: 10px;
      text-align: right;
      z-index: 1;
    }
    .lcd-total-corner .lcd-label { font-size: 0.5rem; }
    .lcd-total-corner .lcd-value {
      font-size: 1.1rem;
      text-shadow: 0 0 6px rgba(255,215,0,0.5);
    }

    .lcd-mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      min-width: 240px;
    }
    .lcd-mini {
      background: var(--lcd-bg);
      border-radius: 7px;
      padding: 8px 10px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.9), inset 0 0 0 1px #051005;
      position: relative;
      overflow: hidden;
    }
    .lcd-mini::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none;
    }
    .lcd-mini .lcd-value { font-size: 1.6rem; }

    /* low-balance warning colour */
    .lcd-value.warning { color: #ff6b35; text-shadow: 0 0 10px rgba(255,107,53,0.7); }

    .msg-bar {
      margin-top: 8px;
      background: var(--lcd-bg);
      border-radius: 6px;
      padding: 6px 12px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.9);
      min-height: 32px;
      display: flex; align-items: center;
      overflow: hidden; position: relative;
    }
    .msg-bar::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
      pointer-events: none;
    }
    #msg {
      font-family: 'VT323', monospace;
      font-size: 1.3rem;
      color: var(--lcd-text);
      text-shadow: 0 0 8px rgba(255,215,0,0.5);
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      z-index: 1;
    }
    #msg.error { color: #ff4444; text-shadow: 0 0 8px rgba(255,68,68,0.5); }
    #msg.warn  { color: #ff8800; text-shadow: 0 0 8px rgba(255,136,0,0.5); }

    /* ─── Section label ─── */
    .section-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--metal-dark);
      text-transform: uppercase;
      margin-bottom: 6px;
      padding-left: 4px;
    }

    /* ─── Key groups ─── */
    .key-group {
      background: linear-gradient(170deg, #101c30, #080f1e);
      border-radius: 14px;
      padding: 12px;
      box-shadow:
        inset 0 2px 6px rgba(0,0,0,0.7),
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 2px 0 rgba(255,255,255,0.02);
    }
    .key-row {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 8px;
    }
    .key-row:last-child { margin-bottom: 0; }

    /* ─── Buttons ─── */
    .btn {
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      position: relative;
      border-radius: 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: filter 0.1s;
    }
    .btn::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,0.16) 0%, transparent 55%);
      pointer-events: none;
    }
    .btn:active { transform: translateY(3px); filter: brightness(0.82); }
    .btn:active::before { opacity: 0.4; }

    .btn-sq { width: 80px; height: 80px; font-size: 1.1rem; }
    .btn-sq .btn-sub { font-size: 0.58rem; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.08em; opacity: 0.85; margin-top: 2px; font-weight: 400; }
    .btn-sq .btn-icon { font-size: 1.6rem; line-height: 1; }
    .btn-wide { flex: 1; height: 64px; font-size: 1rem; }
    .btn-xl { flex: 1; height: 76px; font-size: 1.3rem; border-radius: 12px; }
    .btn-sm { height: 52px; padding: 0 16px; font-size: 0.95rem; flex: 1; }

    .key-display {
      background: var(--lcd-bg);
      border-radius: 8px;
      padding: 8px 14px;
      min-width: 80px;
      text-align: center;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.9), inset 0 0 0 1px #051005;
      position: relative; overflow: hidden;
    }
    .key-display::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
      pointer-events: none;
    }
    .key-display .lcd-value { font-size: 1.8rem; }

    /* colour variants */
    .btn-teal {
      background: linear-gradient(180deg, var(--key-teal-top), var(--key-teal));
      color: #fff;
      box-shadow: 0 5px 0 #073838, 0 6px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(80,255,220,0.15);
    }
    .btn-teal:active { box-shadow: 0 2px 0 #073838, 0 3px 4px rgba(0,0,0,0.5); }

    .btn-red {
      background: linear-gradient(180deg, var(--key-red-top), var(--key-red));
      color: #fff;
      box-shadow: 0 5px 0 #5a0f0f, 0 6px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,100,100,0.2);
    }
    .btn-red:active { box-shadow: 0 2px 0 #5a0f0f, 0 3px 4px rgba(0,0,0,0.5); }

    .btn-amber {
      background: linear-gradient(180deg, var(--key-amber-top), var(--key-amber));
      color: #fff;
      box-shadow: 0 5px 0 #6a3500, 0 6px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,200,80,0.2);
    }
    .btn-amber:active { box-shadow: 0 2px 0 #6a3500, 0 3px 4px rgba(0,0,0,0.5); }

    .btn-grey {
      background: linear-gradient(180deg, var(--key-grey-top), var(--key-grey));
      color: #ccc;
      box-shadow: 0 5px 0 #1a1a1a, 0 6px 8px rgba(0,0,0,0.5);
    }
    .btn-grey:active { box-shadow: 0 2px 0 #1a1a1a, 0 3px 4px rgba(0,0,0,0.5); }

    /* ─── Transaction tape ─── */
    .tape-section {
      background: linear-gradient(170deg, #101c30, #080f1e);
      border-radius: 14px;
      padding: 12px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
      margin-bottom: 12px;
    }
    .tape-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .tape-title { font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 0.25em; color: var(--metal-dark); text-transform: uppercase; }
    .tx-badge {
      background: #060e1a; border-radius: 20px; padding: 2px 10px;
      font-family: 'VT323', monospace; font-size: 1rem; color: var(--stitch);
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
    }
    .tape-body {
      background: #f5f0e8; border-radius: 8px; max-height: 200px;
      overflow-y: auto; padding: 10px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 0 0 1px #c8b090;
      position: relative;
    }
    .tape-body::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(180deg, transparent 0px, transparent 22px, rgba(0,0,0,0.03) 22px, rgba(0,0,0,0.03) 23px);
      pointer-events: none; border-radius: 8px;
    }
    .tape-empty { font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; color: #999; text-align: center; padding: 12px; }
    .tape-table { width: 100%; border-collapse: collapse; font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: #2a2010; }
    .tape-table th { color: #666; font-size: 0.6rem; letter-spacing: 0.08em; border-bottom: 1px dashed #bbb; padding: 2px 4px 4px; text-align: left; }
    .tape-table td { padding: 4px 4px; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .tape-table tr:last-child td { border-bottom: none; }
    .tape-table td:last-child { text-align: right; font-weight: bold; }
    .tape-body::-webkit-scrollbar { width: 4px; }
    .tape-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
    .tape-body::-webkit-scrollbar-thumb { background: #c8b090; border-radius: 4px; }

    /* ─── Summary ─── */
    .summary-section {
      background: linear-gradient(170deg, #101c30, #080f1e);
      border-radius: 14px; padding: 12px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    .summary-toggle {
      width: 100%;
      background: linear-gradient(180deg, #1a2e48, #0e1e30);
      border: none; border-radius: 8px; padding: 10px 16px;
      color: var(--stitch);
      font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em;
      text-transform: uppercase; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 3px 0 #040810, 0 4px 6px rgba(0,0,0,0.4);
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      transition: filter 0.1s;
    }
    .summary-toggle:active { transform: translateY(2px); filter: brightness(0.85); }
    .summary-body { display: none; margin-top: 10px; }
    .summary-body.open { display: block; }
    .summary-tape {
      background: #f5f0e8; border-radius: 8px; padding: 12px;
      font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: #2a2010;
      box-shadow: inset 0 2px 8px rgba(0,0,0,0.3), 0 0 0 1px #c8b090;
      position: relative; overflow: hidden;
    }
    .summary-tape::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(180deg, transparent 0px, transparent 22px, rgba(0,0,0,0.03) 22px, rgba(0,0,0,0.03) 23px); pointer-events: none; }
    .summary-tape h3 { font-size: 0.65rem; letter-spacing: 0.15em; color: #555; border-bottom: 1px dashed #bbb; padding-bottom: 4px; margin-bottom: 6px; text-transform: uppercase; }
    .summary-tape table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
    .summary-tape th { font-size: 0.58rem; color: #888; text-align: left; padding: 2px 0 4px; border-bottom: 1px dashed #ccc; }
    .summary-tape td { padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.04); }
    .summary-tape td:last-child { text-align: right; font-weight: bold; }
    .summary-stat { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
    .summary-stat:last-child { border-bottom: none; font-weight: bold; border-top: 1px dashed #bbb; margin-top: 2px; padding-top: 6px; }

    /* portrait: stack columns */
    .landscape-grid { display: flex; flex-direction: column; gap: 12px; }

    /* ─── Landscape ─── */
    @media (orientation: landscape) {
      body { padding: 10px 20px; align-items: center; }
      .wallet { padding: 14px 16px 18px; }
      .landscape-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      .tape-body { max-height: 140px; }
      .btn-sq { width: 68px; height: 68px; }
      .btn-xl { height: 62px; }
      .btn-wide { height: 54px; }
      .btn-sm { height: 44px; }
    }
    @media (pointer: coarse) {
      .btn-sq { width: 90px; height: 90px; }
      .btn-sq .btn-icon { font-size: 1.8rem; }
      .btn-xl { height: 82px; font-size: 1.35rem; }
    }
    @media (pointer: coarse) and (orientation: landscape) {
      .btn-sq { width: 74px; height: 74px; }
      .btn-xl { height: 68px; }
    }
  </style>
</head>
<body>

<div class="wallet">

  <!-- Header -->
  <div class="wallet-header">
    <div class="brand">
      Klassen-Wallet
      <span>Wallet 5F · Mr. Oehm</span>
    </div>
    <div class="status-lights">
      <div class="light light-green" id="lightBuy"></div>
      <div class="light light-amber" id="lightWarn"></div>
      <div class="light light-red"   id="lightErr"></div>
    </div>
  </div>

  <!-- LCD -->
  <div class="lcd-panel">
    <div class="lcd-row" style="gap:10px">

      <!-- LEFT PANEL: total items bought (left) + balance (right) -->
      <div class="lcd-screen" style="flex:1; display:flex; flex-direction:column; justify-content:center; min-height:110px; padding:10px 14px">
        <div style="display:flex; align-items:flex-end; justify-content:space-between; gap:10px; height:100%">
          <div style="display:flex; flex-direction:column; justify-content:flex-end">
            <div class="lcd-label">TOTAL ITEMS</div>
            <div class="lcd-value" id="totalQtyDisplay" style="font-size:2.8rem; line-height:1">—</div>
          </div>
          <div style="text-align:right; display:flex; flex-direction:column; justify-content:flex-end">
            <div class="lcd-label">BALANCE</div>
            <div class="lcd-value" id="balanceSmall" style="font-size:2.4rem; line-height:1; text-shadow:0 0 10px rgba(255,215,0,0.7)">50,00 €</div>
          </div>
        </div>
      </div>

      <!-- RIGHT PANEL: 2×2 grid -->
      <div class="lcd-screen" style="flex:1; min-height:110px; padding:8px 10px">
        <div style="display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:4px 8px; height:100%">
          <div>
            <div class="lcd-label">LAST QTY</div>
            <div class="lcd-value" id="lastQtyDisplay" style="font-size:1.8rem; line-height:1.1">—</div>
          </div>
          <div style="text-align:right">
            <div class="lcd-label">LAST UNIT PRICE</div>
            <div class="lcd-value" id="lastUnitPrice" style="font-size:1.8rem; line-height:1.1">—</div>
          </div>
          <div>
            <div class="lcd-label">LAST BUY</div>
            <div class="lcd-value" id="lastTxDisplay" style="font-size:1.8rem; line-height:1.1">—</div>
          </div>
          <div style="text-align:right">
            <div class="lcd-label">TRANSACTIONS</div>
            <div class="lcd-value" id="txCount" style="font-size:1.8rem; line-height:1.1">0</div>
          </div>
        </div>
      </div>

    </div>
    <div class="msg-bar">
      <div id="msg">READY&nbsp;▶</div>
    </div>
  </div>

  <!-- Key panels -->
  <div class="landscape-grid">

    <!-- Left: Starting Balance + Price + Quantity -->
    <div>

      <!-- Starting Balance (compact) -->
      <div class="key-group" style="margin-bottom:10px; padding:8px 12px">
        <div style="display:flex; align-items:center; gap:8px">
          <div style="display:flex; flex-direction:column; gap:2px; margin-right:2px">
            <span class="section-label" style="margin:0; white-space:nowrap; line-height:1.2">▸ START</span>
            <span class="section-label" style="margin:0; white-space:nowrap; line-height:1.2">BALANCE</span>
          </div>
          <button id="balDec" class="btn btn-teal" style="width:40px;height:40px;font-size:1.1rem" aria-label="Balance -1">−</button>
          <button class="btn btn-teal" style="width:40px;height:40px;font-size:0.8rem" data-bal-add="-5">−5</button>
          <div class="key-display" style="min-width:64px; padding:4px 8px; display:flex; flex-direction:column; align-items:center">
            <div class="lcd-label" style="font-size:0.5rem">BALANCE</div>
            <div class="lcd-value" id="startBalDisplay" style="font-size:1.4rem; line-height:1.1">50€</div>
          </div>
          <button class="btn btn-teal" style="width:40px;height:40px;font-size:0.8rem" data-bal-add="5">+5</button>
          <button id="balInc" class="btn btn-teal" style="width:40px;height:40px;font-size:1.1rem" aria-label="Balance +1">＋</button>
          <button id="setBal" class="btn btn-amber" style="height:40px;padding:0 12px;font-size:0.8rem;letter-spacing:0.05em">SET</button>
        </div>
      </div>

      <!-- Price -->
      <div class="section-label">▸ Price per Unit</div>
      <div class="key-group" style="margin-bottom:10px">
        <div class="key-row">
          <button id="priceDec" class="btn btn-amber btn-sq" aria-label="Price -0.50€">
            <span class="btn-icon">−</span><span class="btn-sub">0.50 €</span>
          </button>
          <div class="key-display" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center">
            <div class="lcd-label">Price</div>
            <div class="lcd-value" id="priceDisplayKey" style="font-size:2rem">1,00€</div>
          </div>
          <button id="priceInc" class="btn btn-amber btn-sq" aria-label="Price +0.50€">
            <span class="btn-icon">＋</span><span class="btn-sub">0.50 €</span>
          </button>
        </div>
      </div>

      <!-- Quantity -->
      <div class="section-label">▸ Quantity</div>
      <div class="key-group">
        <div class="key-row">
          <button id="qtyDec" class="btn btn-teal btn-sq" aria-label="Qty -1">
            <span class="btn-icon">−</span><span class="btn-sub">QTY</span>
          </button>
          <div class="key-display" style="flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center">
            <div class="lcd-label">Quantity</div>
            <div class="lcd-value" id="qtyDisplayKey" style="font-size:2rem">1</div>
          </div>
          <button id="qtyInc" class="btn btn-teal btn-sq" aria-label="Qty +1">
            <span class="btn-icon">＋</span><span class="btn-sub">QTY</span>
          </button>
        </div>
        <div class="key-row">
          <button class="btn btn-teal btn-sm" data-add="-5">−5</button>
          <button class="btn btn-teal btn-sm" data-add="5">+5</button>
          <button class="btn btn-teal btn-sm" data-add="10">+10</button>
          <button id="maxBtn" class="btn btn-teal btn-sm">MAX</button>
        </div>
      </div>

    </div>

    <!-- Right: Action + Tape + Summary -->
    <div>

      <!-- Action -->
      <div class="section-label">▸ Action</div>
      <div class="key-group" style="margin-bottom:10px">
        <div class="key-row">
          <button id="buy" class="btn btn-red btn-xl" aria-label="Buy">
            💰 BUY
          </button>
          <button id="undoBtn" class="btn btn-grey btn-wide" style="max-width:100px">
            ↩ UNDO
          </button>
          <button id="clear" class="btn btn-grey btn-wide" style="max-width:90px">
            ↺ RESET
          </button>
        </div>
      </div>

      <!-- Transaction tape -->
      <div class="tape-section">
        <div class="tape-header">
          <span class="tape-title">▸ Transactions</span>
          <span class="tx-badge" id="txBadge">0</span>
        </div>
        <div class="tape-body" id="txList">
          <div class="tape-empty">— No purchases yet —</div>
        </div>
      </div>

      <!-- Summary -->
      <div class="summary-section">
        <button class="summary-toggle" id="showSummary">
          <span>▸ SUMMARY</span>
          <span id="summaryArrow">▼</span>
        </button>
        <div class="summary-body" id="summary">
          <div class="summary-tape">
            <div id="aggByPrice"></div>
            <div id="averages" style="margin-top:8px"></div>
          </div>
        </div>
      </div>

    </div>
  </div><!-- /landscape-grid -->
</div><!-- /wallet -->

<script>
  const STORAGE_KEY = '5f_wallet_v2';
  const defaultState = {
    balance: 50.00, startBalance: 50.00,
    priceCents: 100, qty: 1, transactions: []
  };
  let state = loadState();

  function loadState(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ const p=JSON.parse(raw); if(p&&typeof p==='object') return Object.assign({},defaultState,p); }
    }catch(e){}
    return Object.assign({},defaultState);
  }
  function saveState(){ try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){} }

  const $ = id => document.getElementById(id);
  const els = {
    balanceSmall:    $('balanceSmall'),
    startBalDisp:    $('startBalDisplay'),
    priceDispKey:    $('priceDisplayKey'),
    qtyDispKey:      $('qtyDisplayKey'),
    txCount:         $('txCount'),
    txBadge:         $('txBadge'),
    totalQtyDisplay: $('totalQtyDisplay'),
    lastQtyDisplay:  $('lastQtyDisplay'),
    lastTxDisplay:   $('lastTxDisplay'),
    lastUnitPrice:   $('lastUnitPrice'),
    txList:          $('txList'),
    msg:             $('msg'),
    summary:         $('summary'),
    aggByPrice:      $('aggByPrice'),
    averages:        $('averages'),
    summaryArrow:    $('summaryArrow'),
    lightBuy:        $('lightBuy'),
    lightWarn:       $('lightWarn'),
    lightErr:        $('lightErr'),
  };

  function fmt(n){ return Number(n).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+' €'; }
  function centsDisp(c){ return (c/100).toLocaleString('de-DE',{minimumFractionDigits:2,maximumFractionDigits:2})+'€'; }
  function fmtBalance(n){ return Number(n).toLocaleString('de-DE',{minimumFractionDigits:0,maximumFractionDigits:0})+'€'; }

  function setMsg(text, type='ok'){
    els.msg.textContent = text;
    els.msg.className = type==='error' ? 'error' : type==='warn' ? 'warn' : '';
    els.lightBuy.style.boxShadow  = type==='ok'    ? '0 0 8px #ffd700'  : '0 0 4px #4a3a0a';
    els.lightWarn.style.boxShadow = type==='warn'  ? '0 0 10px #ffaa00' : '0 0 4px #4a3a0a';
    els.lightErr.style.boxShadow  = type==='error' ? '0 0 10px #ff4444' : '0 0 4px #4a1a1a';
  }

  function renderAll(){
    els.balanceSmall.textContent = fmt(state.balance);
    els.startBalDisp.textContent = fmtBalance(state.startBalance);
    els.priceDispKey.textContent = centsDisp(state.priceCents);
    els.qtyDispKey.textContent   = state.qty;

    // balance warning colour
    const lowThreshold = state.startBalance * 0.2;
    els.balanceSmall.classList.toggle('warning', state.balance <= lowThreshold && state.balance > 0);

    // total items ever bought (left panel left)
    const totalBought = state.transactions.reduce((s,t)=>s+t.qty, 0);
    els.totalQtyDisplay.textContent = totalBought > 0 ? totalBought : '—';

    // last transaction values (right panel)
    if(state.transactions.length > 0){
      const last = state.transactions[state.transactions.length-1];
      els.lastQtyDisplay.textContent  = last.qty;
      els.lastTxDisplay.textContent   = fmt(last.total);
      els.lastUnitPrice.textContent   = fmt(last.price);
    } else {
      els.lastQtyDisplay.textContent  = '—';
      els.lastTxDisplay.textContent   = '—';
      els.lastUnitPrice.textContent   = '—';
    }

    const n = state.transactions.length;
    els.txCount.textContent = n;
    els.txBadge.textContent = n;

    renderTransactions();
    saveState();
  }

  function renderTransactions(){
    if(state.transactions.length===0){
      els.txList.innerHTML='<div class="tape-empty">— No purchases yet —</div>';
      return;
    }
    const rows = state.transactions.slice().reverse().map(tx=>
      `<tr>
        <td>${new Date(tx.time).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</td>
        <td>${tx.qty}×</td>
        <td>${fmt(tx.price)}</td>
        <td>${fmt(tx.total)}</td>
      </tr>`
    ).join('');
    els.txList.innerHTML=
      `<table class="tape-table">
        <thead><tr><th>Time</th><th>Qty.</th><th>Price</th><th>Total</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    els.txList.scrollTop=0;
  }

  function renderSummary(){
    const agg=new Map();
    for(const tx of state.transactions){
      const k=(Math.round(tx.price*100)/100).toFixed(2);
      const e=agg.get(k)||{price:Number(k),qty:0,total:0};
      e.qty+=tx.qty; e.total+=tx.total; agg.set(k,e);
    }
    const sorted=Array.from(agg.values()).sort((a,b)=>a.price-b.price);
    if(sorted.length===0){
      els.aggByPrice.innerHTML='<div style="color:#888;font-size:0.7rem">No purchases yet.</div>';
      els.averages.innerHTML='';
      return;
    }
    const rows=sorted.map(a=>`<tr><td>${a.qty}</td><td>${fmt(a.price)}</td><td>${fmt(a.total)}</td></tr>`).join('');
    els.aggByPrice.innerHTML=
      `<h3>Purchases by Price</h3>
       <table><thead><tr><th>Qty.</th><th>Price/Unit</th><th>Spent</th></tr></thead><tbody>${rows}</tbody></table>`;
    const totalItems=state.transactions.reduce((s,t)=>s+t.qty,0);
    const totalSpent=state.transactions.reduce((s,t)=>s+t.total,0);
    els.averages.innerHTML=
      `<h3>Averages</h3>
       <div class="summary-stat"><span>Total items bought</span><strong>${totalItems}</strong></div>
       <div class="summary-stat"><span>Total spent</span><strong>${fmt(totalSpent)}</strong></div>
       <div class="summary-stat"><span>Avg. price per item</span><strong>${fmt(totalItems ? totalSpent/totalItems : 0)}</strong></div>
       <div class="summary-stat"><span>Starting balance</span><strong>${fmt(state.startBalance)}</strong></div>
       <div class="summary-stat"><span>Remaining</span><strong>${fmt(state.balance)}</strong></div>`;
  }

  // Orientation
  function updateOrientation(){
    document.body.classList.toggle('landscape', window.matchMedia('(orientation:landscape)').matches);
  }
  window.addEventListener('resize', updateOrientation);
  window.addEventListener('orientationchange', updateOrientation);
  updateOrientation();

  // Starting balance
  $('balInc').addEventListener('click',()=>{ state.startBalance=Math.round((state.startBalance+1)*100)/100; renderAll(); });
  $('balDec').addEventListener('click',()=>{ state.startBalance=Math.max(0,Math.round((state.startBalance-1)*100)/100); renderAll(); });
  $('setBal').addEventListener('click',()=>{ state.balance=state.startBalance; renderAll(); setMsg('BALANCE APPLIED'); });
  document.querySelectorAll('[data-bal-add]').forEach(b=>{
    b.addEventListener('click',()=>{ state.startBalance=Math.max(0,Math.round((state.startBalance+Number(b.dataset.balAdd))*100)/100); renderAll(); });
  });

  // Price
  $('priceInc').addEventListener('click',()=>{ state.priceCents=Math.max(0,state.priceCents+50); renderAll(); });
  $('priceDec').addEventListener('click',()=>{ state.priceCents=Math.max(0,state.priceCents-50); renderAll(); });

  // Quantity
  $('qtyInc').addEventListener('click',()=>{ state.qty=Math.max(1,state.qty+1); renderAll(); });
  $('qtyDec').addEventListener('click',()=>{ state.qty=Math.max(1,state.qty-1); renderAll(); });
  document.querySelectorAll('[data-add]').forEach(b=>{
    b.addEventListener('click',()=>{ state.qty=Math.max(1,state.qty+Number(b.dataset.add)); renderAll(); });
  });
  $('maxBtn').addEventListener('click',()=>{
    const max=Math.floor(state.balance/(state.priceCents/100));
    state.qty=Math.max(1,max); renderAll();
  });

  // Buy
  $('buy').addEventListener('click',()=>{
    const price=state.priceCents/100;
    const qty=Math.floor(state.qty);
    if(qty<=0){ setMsg('QTY MUST BE > 0','error'); return; }
    const total=Math.round((price*qty+Number.EPSILON)*100)/100;
    if(total>state.balance){ setMsg('INSUFFICIENT FUNDS','error'); return; }
    state.balance=Math.round((state.balance-total+Number.EPSILON)*100)/100;
    state.transactions.push({ price:Math.round((price+Number.EPSILON)*100)/100, qty, total, time:new Date().toISOString() });
    renderAll();
    if($('summary').classList.contains('open')) renderSummary();
    setMsg(`OK  ${qty} × ${centsDisp(state.priceCents)} = ${fmt(total)}`,'ok');
    // flash
    els.lightBuy.style.boxShadow='0 0 18px #ffd700, 0 0 30px #ffd700';
    setTimeout(()=>{ els.lightBuy.style.boxShadow='0 0 8px #ffd700'; },300);
    // low balance warning
    if(state.balance < state.startBalance*0.2 && state.balance > 0)
      setMsg(`LOW BALANCE: ${fmt(state.balance)} LEFT`,'warn');
    if(state.balance === 0)
      setMsg('BALANCE EMPTY','error');
  });

  // Undo
  $('undoBtn').addEventListener('click',()=>{
    if(state.transactions.length===0){ setMsg('NOTHING TO UNDO','error'); return; }
    const last=state.transactions.pop();
    state.balance=Math.round((state.balance+last.total+Number.EPSILON)*100)/100;
    renderAll();
    if($('summary').classList.contains('open')) renderSummary();
    setMsg(`UNDONE: ${last.qty} × ${fmt(last.price)}`,'ok');
  });

  // Reset (two-tap)
  let resetArmed=false, resetTimer=null;
  $('clear').addEventListener('click',()=>{
    if(!resetArmed){
      resetArmed=true;
      $('clear').textContent='⚠ SURE?';
      $('clear').style.background='linear-gradient(180deg,#e74c3c,#c0392b)';
      $('clear').style.color='#fff';
      resetTimer=setTimeout(()=>{
        resetArmed=false;
        $('clear').textContent='↺ RESET';
        $('clear').style.background='';
        $('clear').style.color='';
      },3000);
    } else {
      clearTimeout(resetTimer);
      resetArmed=false;
      $('clear').textContent='↺ RESET';
      $('clear').style.background='';
      $('clear').style.color='';
      state.transactions=[];
      state.balance=state.startBalance;
      renderAll();
      if($('summary').classList.contains('open')) renderSummary();
      setMsg('SYSTEM RESET');
    }
  });

  // Summary
  $('showSummary').addEventListener('click',()=>{
    const open=els.summary.classList.toggle('open');
    els.summaryArrow.textContent=open?'▲':'▼';
    if(open) renderSummary();
  });

  // Init
  setMsg('READY\u00A0▶');
  renderAll();
</script>
</body>
</html>
